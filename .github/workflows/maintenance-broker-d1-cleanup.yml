name: Maintenance Broker D1 Cleanup

on:
  workflow_dispatch:
    inputs:
      mode:
        description: inspect or delete matching broker trial state
        required: true
        type: choice
        options:
          - inspect
          - delete
      hardware_hash:
        description: Target verified hardware hash
        required: true
        type: string
      hardware_hash_salt_version:
        description: Target hardware hash salt version
        required: true
        type: string
      confirm_delete:
        description: Type `delete matching broker trial state` to confirm destructive cleanup
        required: false
        type: string

permissions:
  contents: read

jobs:
  cleanup:
    runs-on: ubuntu-latest
    environment: production
    env:
      NODE_VERSION: '22'
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      BROKER_D1_DATABASE_ID_PRODUCTION: ${{ secrets.BROKER_D1_DATABASE_ID_PRODUCTION }}
    steps:
      - name: Guard inputs
        shell: bash
        run: |
          if [[ "${{ github.event.inputs.mode }}" != 'inspect' && "${{ github.event.inputs.mode }}" != 'delete' ]]; then
            echo 'mode must be inspect or delete' >&2
            exit 1
          fi

          if [[ -z "${{ github.event.inputs.hardware_hash }}" ]]; then
            echo 'hardware_hash is required' >&2
            exit 1
          fi

          if [[ ! "${{ github.event.inputs.hardware_hash_salt_version }}" =~ ^[0-9]+$ ]]; then
            echo 'hardware_hash_salt_version must be an integer' >&2
            exit 1
          fi

          if [[ "${{ github.event.inputs.mode }}" == 'delete' && "${{ github.event.inputs.confirm_delete }}" != 'delete matching broker trial state' ]]; then
            echo 'confirm_delete must exactly match: delete matching broker trial state' >&2
            exit 1
          fi

      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: refs/heads/main

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile

      - name: Render production Wrangler config
        working-directory: broker
        run: >-
          node scripts/render-production-wrangler-config.mjs
          --database-id "$BROKER_D1_DATABASE_ID_PRODUCTION"
          --out wrangler.production.jsonc

      - name: Inspect matching broker rows
        id: inspect
        shell: bash
        working-directory: broker
        run: |
          python3 - <<'PY'
          from pathlib import Path

          hardware_hash = "${{ github.event.inputs.hardware_hash }}"
          salt_version = int("${{ github.event.inputs.hardware_hash_salt_version }}")
          sql = f"""
          WITH target_installations AS (
            SELECT DISTINCT e.installation_id
              FROM openrouter_entitlements e
              JOIN installations i ON i.installation_id = e.installation_id
             WHERE e.status IN ('pending_release', 'active')
               AND (
                 (e.verified_hardware_hash = '{hardware_hash}' AND e.verified_hardware_hash_salt_version = {salt_version})
                 OR (
                   e.verified_hardware_hash IS NULL
                   AND e.verified_hardware_hash_salt_version IS NULL
                   AND i.hardware_hash = '{hardware_hash}'
                   AND i.hardware_hash_salt_version = {salt_version}
                 )
               )
          )
          SELECT i.installation_id,
                 e.status,
                 e.managed_credential_ref,
                 e.issued_at,
                 e.expires_at,
                 e.verified_hardware_hash,
                 e.verified_hardware_hash_salt_version,
                 i.hardware_hash,
                 i.hardware_hash_salt_version,
                 i.created_at,
                 i.last_seen_at
            FROM target_installations t
            JOIN installations i ON i.installation_id = t.installation_id
            LEFT JOIN openrouter_entitlements e ON e.installation_id = t.installation_id
           ORDER BY i.created_at ASC;
          """
          Path(".maintenance-inspect.sql").write_text(sql.strip() + "\n", encoding="utf-8")
          PY

          pnpm exec wrangler d1 execute puripuly-heart-broker --remote --config wrangler.production.jsonc --file .maintenance-inspect.sql --json > .maintenance-inspect.json
          cat .maintenance-inspect.json

      - name: Delete matching broker rows
        if: ${{ github.event.inputs.mode == 'delete' }}
        shell: bash
        working-directory: broker
        run: |
          python3 - <<'PY'
          from pathlib import Path

          hardware_hash = "${{ github.event.inputs.hardware_hash }}"
          salt_version = int("${{ github.event.inputs.hardware_hash_salt_version }}")
          sql = f"""
          BEGIN TRANSACTION;
          DELETE FROM broker_request_events
           WHERE installation_id IN (
            SELECT DISTINCT e.installation_id
              FROM openrouter_entitlements e
              JOIN installations i ON i.installation_id = e.installation_id
             WHERE e.status IN ('pending_release', 'active')
               AND (
                 (e.verified_hardware_hash = '{hardware_hash}' AND e.verified_hardware_hash_salt_version = {salt_version})
                 OR (
                   e.verified_hardware_hash IS NULL
                   AND e.verified_hardware_hash_salt_version IS NULL
                   AND i.hardware_hash = '{hardware_hash}'
                   AND i.hardware_hash_salt_version = {salt_version}
                 )
               )
           );

          DELETE FROM installations
           WHERE installation_id IN (
            SELECT DISTINCT e.installation_id
              FROM openrouter_entitlements e
              JOIN installations i ON i.installation_id = e.installation_id
             WHERE e.status IN ('pending_release', 'active')
               AND (
                 (e.verified_hardware_hash = '{hardware_hash}' AND e.verified_hardware_hash_salt_version = {salt_version})
                 OR (
                   e.verified_hardware_hash IS NULL
                   AND e.verified_hardware_hash_salt_version IS NULL
                   AND i.hardware_hash = '{hardware_hash}'
                   AND i.hardware_hash_salt_version = {salt_version}
                 )
               )
           );
          COMMIT;
          """
          Path(".maintenance-delete.sql").write_text(sql.strip() + "\n", encoding="utf-8")
          PY

          pnpm exec wrangler d1 execute puripuly-heart-broker --remote --config wrangler.production.jsonc --file .maintenance-delete.sql --json > .maintenance-delete.json
          cat .maintenance-delete.json

      - name: Re-inspect after delete
        if: ${{ github.event.inputs.mode == 'delete' }}
        shell: bash
        working-directory: broker
        run: |
          pnpm exec wrangler d1 execute puripuly-heart-broker --remote --config wrangler.production.jsonc --file .maintenance-inspect.sql --json > .maintenance-post-delete.json
          cat .maintenance-post-delete.json
