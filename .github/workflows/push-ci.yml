name: Push CI

on:
  push:
    tags-ignore:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

env:
  PYTHON_VERSION: "3.12.10"
  UV_VERSION: "0.9.17"
  INNOSETUP_VERSION: "6.6.1"

concurrency:
  group: push-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality-gate:
    name: Lint and unit tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup UV environment
        uses: ./.github/actions/setup-uv-environment
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          uv-version: ${{ env.UV_VERSION }}
          sync-args: --dev

      - name: Ruff
        run: uv run ruff check src tests

      - name: Black (check)
        run: uv run black --check src tests

      - name: Pytest with coverage >= 80% (exclude integration)
        run: |
          uv run python -m pytest \
            --ignore=tests/integration \
            --cov=src/puripuly_heart \
            --cov-report=term-missing \
            --cov-fail-under=80

  windows-overlay-tests:
    name: Windows overlay cargo test
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Run native overlay tests
        shell: pwsh
        run: cargo test --manifest-path native/overlay/Cargo.toml -q

  windows-release-path:
    name: Build Windows release path
    runs-on: windows-latest
    needs:
      - windows-overlay-tests
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup UV environment
        uses: ./.github/actions/setup-uv-environment
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          uv-version: ${{ env.UV_VERSION }}
          sync-args: --extra build

      - name: Prepare soxr release inputs
        shell: pwsh
        run: |
          ./scripts/ci/prepare-soxr-release-inputs.ps1

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Read project version
        id: version
        shell: bash
        run: |
          VERSION="$(python scripts/ci/read-project-version.py)"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Build release artifacts
        shell: pwsh
        env:
          APP_VERSION: ${{ steps.version.outputs.version }}
          INNOSETUP_VERSION: ${{ env.INNOSETUP_VERSION }}
        run: |
          ./scripts/ci/build-release-artifacts.ps1 `
            -AppVersion $env:APP_VERSION `
            -InnoSetupVersion $env:INNOSETUP_VERSION
